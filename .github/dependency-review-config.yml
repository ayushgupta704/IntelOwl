# Config for Dependency Review
# See: https://github.com/actions/dependency-review-action#configuration
fail_on_severity: high
fail_on_scorecard: false
allow_licenses:
  - 0BSD
  - AFL-2.1
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - BSD-Advertising-Acknowledgement
  - CAL-1.0
  - CC-BY-3.0
  - CC0-1.0
  - GPL-1.0-or-later
  - GPL-2.0
  - GPL-2.0-only
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - HPND-Markus-Kuhn
  - ISC
  - LGPL-2.0-or-later
  - LGPL-2.1
  - LGPL-2.1-only
  - LGPL-3.0
  - LGPL-3.0-only
  - LGPL-3.0-or-later
  - LPPL-1.3c
  - MIT
  - MIT-0
  - MIT-CMU
  - MPL-1.1
  - MPL-2.0
  - OpenSSL
  - PSF-2.0
  - Python-2.0
  - Python-2.0.1
  - Ruby
  - Unlicense
  - Zlib
  - curl
  - LicenseRef-github-NOASSERTION
  - LicenseRef-scancode-proprietary-license
  - LicenseRef-scancode-public-domain
  - LicenseRef-scancode-secret-labs-2011
  - LicenseRef-scancode-unknown-license-reference

allow_dependencies_licenses_not_found: true
